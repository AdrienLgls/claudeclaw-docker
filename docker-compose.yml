services:

  mathis:
    build: .
    restart: always
    working_dir: /workspace
    environment:
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN}
    volumes:
      # Workspace du bot (CLAUDE.md, todo, etc.)
      - ./bots/mathis/workspace:/workspace
      # Config claudeclaw : lu depuis process.cwd()/.claude/claudeclaw/settings.json
      # → doit être monté dans le workspace, PAS dans $HOME
      - ./bots/mathis/claude-state:/workspace/.claude
      # Projets partagés en lecture/écriture (les bots peuvent coder)
      - ../claudeclaw-workspace/Ironeo:/workspace/Ironeo
      - ../claudeclaw-workspace/Ironeo-mobile:/workspace/Ironeo-mobile

  mathys:
    build: .
    restart: always
    working_dir: /workspace
    environment:
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN}
    volumes:
      - ./bots/mathys/workspace:/workspace
      - ./bots/mathys/claude-state:/workspace/.claude
      - ../claudeclaw-workspace/Ironeo:/workspace/Ironeo
      - ../claudeclaw-workspace/Ironeo-mobile:/workspace/Ironeo-mobile

  adrien:
    build: .
    restart: always
    working_dir: /workspace
    environment:
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN}
    volumes:
      - ./bots/adrien/workspace:/workspace
      - ./bots/adrien/claude-state:/workspace/.claude
      - ../claudeclaw-workspace/Ironeo:/workspace/Ironeo
      - ../claudeclaw-workspace/Ironeo-mobile:/workspace/Ironeo-mobile

  # Nouveau bot = copier ce bloc, changer le nom, créer le dossier bots/<nom>/
