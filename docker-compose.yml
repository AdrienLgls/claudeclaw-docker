services:

  # ── Mémoires persistantes (claude-mem workers) ──────────────────────────────
  # Chaque bot a son propre worker sur un port dédié, avec ses propres données.
  # network_mode: host → accessible à 127.0.0.1 depuis tous les containers.

  claude-mem-adrien:
    build: .
    restart: always
    network_mode: host
    entrypoint: ["bun", "/opt/claude-mem/plugin/scripts/worker-wrapper.cjs"]
    volumes:
      - ./bots/adrien/claude-mem:/home/claudeclaw/.claude-mem

  claude-mem-mathis:
    build: .
    restart: always
    network_mode: host
    entrypoint: ["bun", "/opt/claude-mem/plugin/scripts/worker-wrapper.cjs"]
    volumes:
      - ./bots/mathis/claude-mem:/home/claudeclaw/.claude-mem

  claude-mem-mathys:
    build: .
    restart: always
    network_mode: host
    entrypoint: ["bun", "/opt/claude-mem/plugin/scripts/worker-wrapper.cjs"]
    volumes:
      - ./bots/mathys/claude-mem:/home/claudeclaw/.claude-mem

  # ── Bots Discord ─────────────────────────────────────────────────────────────

  mathis:
    build: .
    restart: always
    network_mode: host
    working_dir: /workspace
    depends_on:
      - claude-mem-mathis
    environment:
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN}
      - CLAUDE_MEM_WORKER_PORT=37778
    volumes:
      - ./bots/mathis/workspace:/workspace
      - ./bots/mathis/claude-state:/workspace/.claude
      - ./bots/mathis/claude-state/claudeclaw:/home/claudeclaw/.claude/claudeclaw
      - ../claudeclaw-workspace/Ironeo:/workspace/Ironeo
      - ../claudeclaw-workspace/Ironeo-mobile:/workspace/Ironeo-mobile
      - /home/claudeclaw/SecondBrain:/home/claudeclaw/SecondBrain
      - ./bots/adrien/claude-state:/workspace/bots/adrien
      - ./bots/mathys/claude-state:/workspace/bots/mathys

  mathys:
    build: .
    restart: always
    network_mode: host
    working_dir: /workspace
    depends_on:
      - claude-mem-mathys
    environment:
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN}
      - CLAUDE_MEM_WORKER_PORT=37779
    volumes:
      - ./bots/mathys/workspace:/workspace
      - ./bots/mathys/claude-state:/workspace/.claude
      - ./bots/mathys/claude-state/claudeclaw:/home/claudeclaw/.claude/claudeclaw
      - ../claudeclaw-workspace/Ironeo:/workspace/Ironeo
      - ../claudeclaw-workspace/Ironeo-mobile:/workspace/Ironeo-mobile
      - /home/claudeclaw/SecondBrain:/home/claudeclaw/SecondBrain
      - ./bots/adrien/claude-state:/workspace/bots/adrien
      - ./bots/mathis/claude-state:/workspace/bots/mathis

  adrien:
    build: .
    restart: always
    network_mode: host
    working_dir: /workspace
    depends_on:
      - claude-mem-adrien
    environment:
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN}
      - CLAUDE_MEM_WORKER_PORT=37776
    volumes:
      - ./bots/adrien/workspace:/workspace
      - ./bots/adrien/claude-state:/workspace/.claude
      - ./bots/adrien/claude-state/claudeclaw:/home/claudeclaw/.claude/claudeclaw
      - ../claudeclaw-workspace/Ironeo:/workspace/Ironeo
      - ../claudeclaw-workspace/Ironeo-mobile:/workspace/Ironeo-mobile
      - /home/claudeclaw/SecondBrain:/home/claudeclaw/SecondBrain
      - ./bots/mathis/claude-state:/workspace/bots/mathis
      - ./bots/mathys/claude-state:/workspace/bots/mathys

  # Nouveau bot = copier ce bloc, changer le nom, créer le dossier bots/<nom>/
